<section>
    <div id="carouselContainer">
        <button
            type="button"
            class="navButton navButtonLeft"
            aria-label="Testimonio anterior"
            id="rotado"
            (click)="previousSlide()">
            <svg viewBox="0 0 1024 1024" class="icon" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="#ffffff"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path d="M256 120.768L306.432 64 768 512l-461.568 448L256 903.232 659.072 512z" fill="#ffffff"></path></g></svg>
        </button>

        <div id="slidesViewport">
            @for (slide of slides; track slide.author; let index = $index) {
                <article class="slide" [class.active]="index === currentIndex">
                    <p class="author">{{ slide.author }}</p>
                    <div class="line"></div>
                    <p class="quote">{{ slide.quote }}</p>
                </article>
            }
        </div>

        <button
            type="button"
            class="navButton navButtonRight"
            aria-label="Siguiente testimonio"
            (click)="nextSlide()">
            <svg viewBox="0 0 1024 1024" class="icon" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path d="M256 120.768L306.432 64 768 512l-461.568 448L256 903.232 659.072 512z" fill="#ffffff"></path></g></svg>
        </button>
    </div>

    <div id="dotsContainer">
        @for (slide of slides; track slide.author; let index = $index) {
            <button
                type="button"
                class="dot"
                [class.active]="index === currentIndex"
                [attr.aria-label]="'Ir al testimonio ' + (index + 1)"
                (click)="goToSlide(index)">
            </button>
        }
    </div>
</section>
