
@if(paginator){
  <div class="container">
    @for (img of dataSource.data.slice(paginator.pageIndex * paginator.pageSize, (paginator.pageIndex + 1) * paginator.pageSize); track $index) {
        <div class="item">
            <img [ngSrc]="carpeta+img.img" width="200" height="100" class="img-fluid">
          <div class="bottom-right">
            <mat-checkbox 
              (change)="sumar(carpeta + img.src, $event.checked)"
              [checked]="imagenesCheckeadas.includes(carpeta + img.src)" 
              ></mat-checkbox>
          </div>
          <div class="bottom-left">
              <button (click)="borrarFoto(img.id)" matIconButton aria-label="Example icon button with a vertical three dot icon">
                <mat-icon>delete</mat-icon>
              </button>
          </div> 
        </div>
      }
  </div>
}
<div class="d-flex justify-content-evenly my-4">
  <div class="text-center">
    <button mat-fab (click)="actualizar()" matTooltip="actualizar las imagenes">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>
  
  <div class="text-center">
    <button mat-fab (click)="onSubmit()" matTooltip="Guardar" >
      <mat-icon>save</mat-icon>
    </button>
  </div>
</div>


<mat-paginator 
  [pageSizeOptions]="[5, 10, 25, 50, 100]" 
  showFirstLastButtons 
  aria-label="Select page of periodic elements">
</mat-paginator>
