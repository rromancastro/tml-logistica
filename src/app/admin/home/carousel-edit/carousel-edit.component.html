<h2 class="text-center p-1">Seleccionar las imagenes que van a ser parte del carousel: {{tabla()}}</h2>
@if(paginator){
  <div class="container">
    @for (img of dataSource.data.slice(paginator.pageIndex * paginator.pageSize, (paginator.pageIndex + 1) * paginator.pageSize); track img) {
        <div class="item">
          <img [ngSrc]="carpeta+img.src" width="200" height="100" class="img-fluid">
          <div class="bottom-right">
            <mat-checkbox 
              (change)="sumar(carpeta + img.src, $event.checked)"
              [checked]="imagenesCheckeadas.includes(carpeta + img.src)" 
              ></mat-checkbox>
          </div> 
        </div>
      }
  </div>
}

<div class="text-center">
    <button mat-flat-button (click)="onSubmit()" color="primary" >Guardar</button>
</div>

<mat-paginator 
  [pageSizeOptions]="[5, 10, 25, 50, 100]" 
  showFirstLastButtons 
  aria-label="Select page of periodic elements">
</mat-paginator>
